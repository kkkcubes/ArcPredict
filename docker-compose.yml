services:

  postgres:
    image: postgres:16

    container_name: arcpredict-postgres

    restart: always

    environment:
      POSTGRES_DB: arcpredict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgress

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arcpredict"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend

    container_name: arcpredict-backend

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend

    container_name: arcpredict-frontend

    depends_on:
      - backend

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env.local

    restart: unless-stopped

  mcp:
    build: ./mcp

    container_name: arcpredict-mcp

    ports:
      - "3001:3001"

volumes:
  postgres_data: